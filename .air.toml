root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ."
  bin = "./tmp/main"
  entrypoint = ["./tmp/main"]
  include_ext = ["go", "env"]
  exclude_dir = ["tmp"]
  exclude_regex = [".*_test.go$"]
  exclude_unchanged = true
  kill_delay = "1s"
  delay = 0
  send_interrupt = true
  interrupt_kill_delay = "500ms"
  stop_on_error = true

[log]
  time = false
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
